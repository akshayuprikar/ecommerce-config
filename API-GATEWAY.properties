spring.application.name=API-GATEWAY
info.app.name=API-GATEWAY

server.port=8090

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

logging.level.org.springframework.cloud.gateway=DEBUG

# ---------------- AUTH ----------------
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# ---------------- USER ----------------
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[2].id=user-address-service
spring.cloud.gateway.routes[2].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/addresses/**

# ---------------- PRODUCT ----------------
spring.cloud.gateway.routes[3].id=product-service
spring.cloud.gateway.routes[3].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/products/**

spring.cloud.gateway.routes[4].id=category-service
spring.cloud.gateway.routes[4].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/category/**

# ---------------- INVENTORY ----------------
spring.cloud.gateway.routes[5].id=inventory-service
spring.cloud.gateway.routes[5].uri=lb://INVENTORY-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/inventory/**

# ---------------- CART ----------------
spring.cloud.gateway.routes[6].id=cart-service
spring.cloud.gateway.routes[6].uri=lb://CART-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/cart/**

# ---------------- ORDER ----------------
spring.cloud.gateway.routes[7].id=order-service
spring.cloud.gateway.routes[7].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/orders/**

# ---------------- PAYMENT ----------------
spring.cloud.gateway.routes[8].id=payment-service
spring.cloud.gateway.routes[8].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/payments/**

# ---------------- NOTIFICATION ----------------
spring.cloud.gateway.routes[9].id=notification-service
spring.cloud.gateway.routes[9].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/notifications/**
