
# Eureka
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.env.enabled=true

management.endpoint.prometheus.access=unrestricted
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# Zipkin
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}

# Logging
logging.file.name=${LOG_PATH:/logs}/${spring.application.name}.log

logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [%X{traceId}] %logger{36} - %msg%n

# Info
info.app.version=1.0
info.app.name=${spring.application.name}

springdoc.swagger-ui.path=/swagger-ui.html
